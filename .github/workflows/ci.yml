name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: gofmt + build (macOS, cgo/WKWebView)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # weft-app-osx depends on the sibling weft-app-core module via a
      # `replace` directive; CI clones it alongside.
      - name: Checkout weft-app-core
        uses: actions/checkout@v4
        with:
          repository: openweft/weft-app-core
          path: ../weft-app-core

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: go vet
        run: go vet ./...

      - name: go test
        run: CGO_ENABLED=1 go test ./... -count=1

      - name: Build
        run: CGO_ENABLED=1 go build -o weft-app-osx .
